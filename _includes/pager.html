
<ul class="pager">
  {% if page.previous.url %}
  <li class="previous">
 <a  href="{{page.previous.url}}" data-toggle="tooltip" data-placement="auto"  title="{{page.previous.title}}">← Previous Post  </a>
  </li> 
  {% endif %}

  {% if page.next.url %}

 <li class="next">
 <a  href="{{page.next.url}}" data-toggle="tooltip" data-placement="auto"  title="{{page.next.title}}">Next Post → </a>
  </li> 
  {% endif %}
  </ul>
