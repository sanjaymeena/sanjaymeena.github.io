<!-- Display Bottom Ad Unit -->
{% if site.ads.enabled %}
<div class="ad-container ad-display-bottom" style="margin: 2rem auto; text-align: center; max-width: 728px; clear: both; position: relative; z-index: 1;">
  {% if site.ads.test_mode %}
  <!-- Test mode placeholder -->
  <div style="background: #fff3e0; border: 2px dashed #ff9800; padding: 1rem; color: #e65100; font-family: sans-serif; height: 90px; display: flex; align-items: center; justify-content: center; flex-direction: column;">
    <strong>BOTTOM AD</strong><br>
    <small>(after comments, end of article)</small>
  </div>
  {% else %}
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-{{ site.ads.client_id }}"
       data-ad-slot="{{ site.ads.display_bottom }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
  {% endif %}
</div>
{% endif %}
