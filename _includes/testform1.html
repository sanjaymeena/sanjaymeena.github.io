

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.2/jquery.min.js"></script>
  <link rel="stylesheet" href="http://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">

<form  id='reg-form' style="max-width:600px"  role="form" action="">
 
<div  class="form-group">

<label for="text">Text</label>
<textarea name="text" id="text" rows="4" cols="30" class="autoDefault" data-default="some default text"> </textarea>
</div>

<div class="form-group">
<label for="language">language</label>
<select id="language" name="language" class="form-control">
  <option value="en" selected="selected">English</option>
  <option value="zh" >Chinese</option>
</select>

</div>  

<div class="form-group">
<label for="language">language</label>
<select id="mode" name="mode" class="form-control">
  <option value="logic_form_format" selected="selected">Logic Form</option>
</select>
</div>  

<div class="form-group">
<label for="language">language</label>
<select id="outputFormat" name="outputFormat" class="form-control">
  <option value="xml" selected="selected">XML</option>
</select>
</div>  


</div>
  
 <input type="submit" value="Submit">
</form>


<script type="text/javascript">
$(document).ready(function()
{

 $(function() {
    $('$text').focus(function() {
        if ($(this).val() === $(this).data('default') && !$(this).data('edited')) {
            $(this).val('');
        }
    }).change(function() {
        $(this).data('edited', this.value.length > 0);
    }).blur(function() {
        if ($(this).val().length === 0) {
            $(this).val($(this).data('default'));
        }
    }).blur(); //fire blur event initially
});

 $(document).on('submit', '#reg-form', function(event)
 {


  // Stop form from submitting normally
  event.preventDefault();
  
  var data = $(this).serialize();
  
  
  $.ajax({
  
  type : 'GET',
  url  : 'http://sanjaymeena.io/nlpdemo/GrammarAnalysis',
  data : data,
   success: function(data, textStatus, jqXHR)
    {
       //alert(data) //data - response from server
       $('#result').html(data);
    },
    error: function (jqXHR, textStatus, esrrorThrown)
    {
    	
    }
  });
  return false;
 });
 
});
</script>

<div id="result"></div>
