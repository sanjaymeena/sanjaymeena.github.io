# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Site Settings
locale                   : "en-US"
title                    : "Seeking Wisdom"
title_separator          : "-"
name                     : "Sanjay Meena"
description              : "Blog on Equities, Tech, Books"
url                      : http://localhost:4000
baseurl                  :
base_path                : http://localhost:4000 #"http://sanjaymeena.io"
teaser                   : # filename of teaser fallback teaser image placed in /images/, .e.g. "500x300.png"
# breadcrumbs            : false # true, false (default)
words_per_minute         : 200
comments:
  provider               : "disqus"
  disqus:
    shortname            : "sanjaymeenaio"
  discourse:
    server               : # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  facebook:
    # https://developers.facebook.com/docs/plugins/comments
    appid                : 104927903264352
    num_posts            : # 5 (default)
    colorscheme          : # "light" (default), "dark"

# SEO Related
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social Sharing
twitter:
  username               : sanjaymeena
facebook:
  username               : sanjaymeena
  app_id                 : 104927903264352
  publisher              :
og_image                 : # Open Graph/Twitter default site image
# For specifying social profiles
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type                   : Person
  name                   : Sanjay Meena
  links: # An array of links to social media profiles
    - "https://twitter.com/sanjaymeena"
    - "https://www.linkedin.com/in/sanjay-meena-7546058"
    - "https://plus.google.com/u/0/+sanjaymeena123"

# Analytics
analytics:
  provider               : "google-universal" # false (default), "google", "google-universal", "custom"
  google:
    tracking_id          : "UA-78154345-1"

# Google AdSense
google_ad_client         :
google_ad_slot           :


# Site Author
