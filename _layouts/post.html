---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  <hr>

  <div>
  Tags: {% include tagsforpost.html tags=page.tags %} 
  <hr> 
  </div>
  
  {% include sharing.html %}

  {% include disqus.html %}
</article>
